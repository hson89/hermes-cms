apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-authoring-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: content-authoring
  template:
    metadata:
      labels:
        app: content-authoring
    spec:
      containers:
      - name: content-authoring
        image: hermes-content-authoring:latest
        ports:
        - containerPort: 8000
