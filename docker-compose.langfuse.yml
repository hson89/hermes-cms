name: hermes-langfuse

services:
  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    restart: always
    depends_on:
      postgres-langfuse:
        condition: service_healthy
      minio-langfuse:
        condition: service_healthy
      redis-langfuse:
        condition: service_healthy
      clickhouse-langfuse:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: http://localhost:3003
      DATABASE_URL: postgresql://postgres:postgres@postgres-langfuse:5432/postgres
      SALT: hermes-langfuse-salt
      ENCRYPTION_KEY: 64aeadc73df22a33139cb5690878a196398cf638b904a4d0c7e06c4fb4a45a80
      TELEMETRY_ENABLED: "true"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse-langfuse:9000
      CLICKHOUSE_URL: http://clickhouse-langfuse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: hermes-minio-secret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio-langfuse:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: hermes-minio-secret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio-langfuse:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: redis-langfuse
      REDIS_PORT: 6379
      REDIS_AUTH: hermes-redis-secret

  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    restart: always
    depends_on:
      postgres-langfuse:
        condition: service_healthy
      minio-langfuse:
        condition: service_healthy
      redis-langfuse:
        condition: service_healthy
      clickhouse-langfuse:
        condition: service_healthy
    ports:
      - "3003:3000"
    environment:
      NEXTAUTH_URL: http://localhost:3003
      DATABASE_URL: postgresql://postgres:postgres@postgres-langfuse:5432/postgres
      SALT: hermes-langfuse-salt
      ENCRYPTION_KEY: 64aeadc73df22a33139cb5690878a196398cf638b904a4d0c7e06c4fb4a45a80
      NEXTAUTH_SECRET: hermes-langfuse-secret
      TELEMETRY_ENABLED: "true"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse-langfuse:9000
      CLICKHOUSE_URL: http://clickhouse-langfuse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: hermes-minio-secret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio-langfuse:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: hermes-minio-secret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio-langfuse:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: redis-langfuse
      REDIS_PORT: 6379
      REDIS_AUTH: hermes-redis-secret

  clickhouse-langfuse:
    image: docker.io/clickhouse/clickhouse-server
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "8124:8123"
      - "9001:9000"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  minio-langfuse:
    image: cgr.dev/chainguard/minio
    restart: always
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: hermes-minio-secret
    ports:
      - "9094:9000"
      - "9095:9001"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s

  redis-langfuse:
    image: docker.io/redis:7
    restart: always
    command: >
      --requirepass hermes-redis-secret
      --maxmemory-policy noeviction
    ports:
      - "6380:6379"
    volumes:
      - langfuse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  postgres-langfuse:
    image: docker.io/postgres:17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5434:5432"
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data

networks:
  default:
    name: hermes-net
    external: true

volumes:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
  langfuse_redis_data:
