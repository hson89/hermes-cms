
services:
  # Main CMS Database
  postgres_cms:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hermes_cms
    ports:
      - "5432:5432"
    volumes:
      - postgres_cms_data:/var/lib/postgresql

  # Separate AI Service Database (T008)
  postgres_ai:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hermes_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_ai_data:/var/lib/postgresql

  # Message Broker (T010)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  ai_agent_service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.ai
    ports:
      - "8000:8000"
    env_file:
      - ./apps/ai-agent-service/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres_ai:5432/hermes_ai
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - postgres_ai
      - kafka

volumes:
  postgres_cms_data:
  postgres_ai_data:
