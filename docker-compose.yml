name: hermes-cms

services:
  # Main CMS Database
  postgres_cms:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hermes_cms
    ports:
      - "5432:5432"
    volumes:
      - postgres_cms_data:/var/lib/postgresql

  # Separate Content Authoring Service Database (T008)
  postgres_authoring:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hermes_authoring
    ports:
      - "5433:5432"
    volumes:
      - postgres_authoring_data:/var/lib/postgresql

  # Message Broker (T010)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  content_authoring_service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.authoring
    ports:
      - "8000:8000"
    env_file:
      - ./apps/content-authoring-service/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres_authoring:5432/hermes_authoring
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - postgres_authoring
      - kafka

  content_management_engine:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.engine
    ports:
      - "3000:3000"
    env_file:
      - ./apps/content-management-engine/.env
    environment:
      - DATABASE_URI=postgresql://postgres:postgres@postgres_cms:5432/hermes_cms
      - CONTENT_AUTHORING_SERVICE_URL=http://content_authoring_service:8000
    depends_on:
      - postgres_cms
      - content_authoring_service

  nextjs_blog:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.nextjs-blog
    ports:
      - "3001:3001"
    environment:
      - PAYLOAD_URL=http://content_management_engine:3000
      - PAYLOAD_API_KEY=dummy-key
    depends_on:
      - content_management_engine

  astro_portfolio:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.astro-portfolio
    ports:
      - "3002:3002"
    environment:
      - PAYLOAD_URL=http://content_management_engine:3000
      - PAYLOAD_API_KEY=dummy-key
    depends_on:
      - content_management_engine

networks:
  default:
    name: hermes-net
    external: true

volumes:
  postgres_cms_data:
  postgres_authoring_data:
